# Load balancer for 2 app replicas; sticky session by cookie for WebSocket (T6.1.4).
events { worker_connections 1024; }
http {
    upstream ebook_chat {
        ip_hash;
        server ebook-chat-app-1:8080;
        server ebook-chat-app-2:8080;
        keepalive 32;
    }
    server {
        listen 80;
        location / {
            proxy_pass http://ebook_chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Sec-WebSocket-Key $http_sec_webSocket_key;
            proxy_set_header Sec-WebSocket-Version $http_sec_webSocket_version;
            # Sticky session by JSESSIONID so same client hits same instance (WebSocket affinity)
            ip_hash;
        }
    }
}
